services:
  # Staging Environment
  - type: web
    name: hospital-api-staging
    env: docker
    dockerContext: .
    dockerfilePath: ./Dockerfile
    branch: staging
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: staging
      - key: DATABASE_URL
        sync: false # Set securely in Render dashboard
      - key: JWT_SECRET_KEY
        sync: false # Set securely in Render dashboard (min 64 chars)
      - key: SUPERADMIN_PASSWORD
        sync: false # Set securely in Render dashboard
      - key: CORS_ORIGINS
        sync: false # Set securely in Render dashboard as JSON array

  # Production Environment
  - type: web
    name: hospital-api-main
    env: docker
    dockerContext: .
    dockerfilePath: ./Dockerfile
    branch: main
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        sync: false # Set securely in Render dashboard
      - key: JWT_SECRET_KEY
        sync: false # Set securely in Render dashboard (min 64 chars)
      - key: SUPERADMIN_PASSWORD
        sync: false # Set securely in Render dashboard
      - key: CORS_ORIGINS
        sync: false # Set securely in Render dashboard as JSON array
